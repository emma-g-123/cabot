<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Cabot's Trees & Hedges</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Lexend+Exa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-light">
        <a href="index.html" class="nav-logo-small">
            <img src="uploads/logo.png" alt="Cabot's Trees" />
        </a>
        <div class="burger-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="testimonials.html">Testimonials</a></li>
            <li><a href="locations.html">Locations</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#news">News</a></li>
        </ul>
    </nav>

    <!-- Thank You Section -->
    <section class="contact-section">
        <div class="contact-container">
            <div class="thank-you-page">
                <h1>Thank You</h1>
                <p>Thank you, someone from Cabot's trees will be in touch shortly. For urgent enquiries please call <a href="tel:07428461278">07428 461278</a>.</p>
                <a href="index.html" class="back-home-btn">Back to Home</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-logo">
                <img src="uploads/logo.png" alt="Cabot's Trees" />
            </div>
            <div class="footer-contact">
                <p><a href="tel:07428461278">07428 461278</a></p>
                <p><a href="mailto:info@cabotstrees.com">info@cabotstrees.com</a></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Cabot's Trees & Hedges. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Burger menu toggle
        const burgerMenu = document.querySelector('.burger-menu');
        const navLinks = document.querySelector('.nav-links');

        if (burgerMenu) {
            burgerMenu.addEventListener('click', function() {
                burgerMenu.classList.toggle('active');
                navLinks.classList.toggle('active');
            });

            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', function() {
                    burgerMenu.classList.remove('active');
                    navLinks.classList.remove('active');
                });
            });
        }

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
