backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "hero"
        label: "Hero Carousel Images"
        file: "_content/hero-settings.md"
        fields:
          - {label: "Hero Image 1", name: "hero_image_1", widget: "image"}
          - {label: "Hero Image 2", name: "hero_image_2", widget: "image"}
          - {label: "Hero Image 3", name: "hero_image_3", widget: "image"}
          - {label: "Hero Image 4", name: "hero_image_4", widget: "image"}

  - name: "pages"
    label: "Pages"
    folder: "_content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Content", name: "body", widget: "markdown"}

  - name: "blog"
    label: "Blog Posts"
    folder: "_content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Content", name: "body", widget: "markdown"}
      - {label: "Publish Date", name: "date", widget: "datetime"}